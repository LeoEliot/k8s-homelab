apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 82.15.1
    helm:
      valuesObject:
        crds:
          enabled: false
        prometheus:
          prometheusSpec:
            retention: 1d
        grafana:
          grafana.ini:
            server:
              root_url: https://grafana.malef.lan
            auth.generic_oauth:
              enabled: true
              name: Keycloak
              allow_sign_up: true
              client_id: grafana 
              client_secret: "pSJIBPZYTZEVNY9Z7pB0ZWpPVVCfFKVz" 
              scopes: openid profile email roles 
              auth_url: "https://keycloak.malef.lan/realms/malef/protocol/openid-connect/auth"
              token_url: "https://keycloak.malef.lan/realms/malef/protocol/openid-connect/token"
              api_url: "https://keycloak.malef.lan/realms/malef/protocol/openid-connect/userinfo"
              role_attribute_path: "contains(roles[*], 'admin') && 'Admin' || contains(roles[*], 'editor') && 'Editor' || 'Viewer'"
              use_refresh_token: true
  syncPolicy:
    syncOptions:
      - ClientSideApplyMigration=false
      - CreateNamespace=true
    automated: 
      prune: true
      selfHeal: true
    