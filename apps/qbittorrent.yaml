apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qbittorrent
  namespace: argocd
  annotations:
    argocd.argorpoj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/LeoEliot/k8s-homelab.git
    targetRevision: main
    path: manifests/qbittorrent
  destination:
    server: https://kubernetes.default.svc
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true