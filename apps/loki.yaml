apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  destination:
    namespace: logging
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: loki
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 6.55.0
    helm:
      valuesObject:
        deploymentMode: SingleBinary
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          compactor:
            working_directory: /var/loki/compactor/retention
            delete_request_store: filesystem
            retention_enabled: true
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          storage:
            type: "filesystem"
          limits_config:
            retention_period: 14d
        singleBinary:
          replicas: 1
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ClientSideApplyMigration=false
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true