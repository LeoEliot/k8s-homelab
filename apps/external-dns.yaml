kind: Namespace
apiVersion: v1
metadata:
  name: external-dns
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
spec:
  destination:
    namespace: external-dns
    server: https://kubernetes.default.svc
  project: homelab
  source:
    chart: external-dns
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    targetRevision: 1.20.0
    helm:
      valuesObject:
        provider:
          name: rfc-2136
        fullnameOverride: external-dns
        policy: sync
        registry: txt
        txtOwnerId: k8s
        txtPrefix: external-dns-
        sources:
          - service
          - crd
        extraArgs:
          - "--annotation-filter=external-dns.custom/type in (public)"
          - "--rfc2136-host=192.168.1.10"
          - "--rfc2136-port=53"
          - "--rfc2136-zone=malef.lan"
          - "--rfc2136-tsig-secret=SP0tjHmNb+HdGHsQWHftCt4EQ7lMLxfIHZu1W4jhhx8="
          - "--rfc2136-tsig-secret-alg=hmac-sha256"
          - "--rfc2136-tsig-keyname=tsig-key"
          - "--rfc2136-tsig-axfr"
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true