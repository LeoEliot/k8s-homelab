apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelab
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destinations:
    - name: "*"
      namespace: "*"
      server: "*"
  sourceRepos:
    - "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: homelab-manifest
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/LeoEliot/k8s-homelab.git
        revision: HEAD
        files:
          - path: manifest/*.yaml
  template:
    metadata:
      name: '{{ normalize .path.filename }}'
    spec:
      project: homelab
      source:
        repoURL: https://github.com/LeoEliot/k8s-homelab.git
        path: '{{ .path.path }}'
        targetRevision: HEAD
      destination:
        server: "https://kubernetes.default.svc"
      syncPolicy:
        syncOptions:
          - CreateNamespace=false
        automated:
          prune: true
          selfHeal: true
          allowEmpty: true