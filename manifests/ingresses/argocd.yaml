apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  metadata: argocd
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  ingressClassName: nginx
  rules:
    - host: argocd.malef.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
  tls:
    - hosts: 
      - argocd.malef.lan
      secretName: argocd-server-tls
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: argocd-dns
  namespace: external-dns
spec:
  endpoints:
    - dnsName: argocd.malef.lan
      recordType: A
      targets:
        - 192.168.1.15
