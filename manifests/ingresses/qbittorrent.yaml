apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qb-ingress
  namespace: media
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
spec:
  ingressClassName: nginx
  rules:
    - host: qb.malef.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qbittorrent
                port:
                  number: 8080
  tls:
    - hosts: 
      - qb.malef.lan
      secretName: qb-server-tls
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: qb-dns
  namespace: external-dns
spec:
  endpoints:
    - dnsName: qb.malef.lan
      recordType: A
      targets:
        - 192.168.1.15